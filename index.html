<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Shopping List Web App</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="assets/css/main.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
        <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
        <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
        <link rel="manifest" href="assets/site.webmanifest">
    </head>
    <body>
        <div class="container">
            <img src="assets/shopping-logo.gif" alt="" class="main-logo">
            <h1>Shopping List</h1>
            <form id="shopping-form">
                <div class="form-field">
                    <input type="text" placeholder="What would you like to buy?" id="item-input">
                </div>
                <div class="form-field">
                    <select id="buyer-input">
                        <option>Aakash</option>
                        <option>Adrian</option>
                        <option>Eraisha</option>
                        <option>Pruthuvi</option>
                    </select>
                </div>
                <button id="add-item-btn" class="btn">Add Item</button>
            </form>
            <ul class="items-container" id="items-container">
            </ul>
            <footer>Not a Pereira? Get out of here! Illustration by <a href="https://icons8.com/illustrations/author/kP9rc8JiBCcz">Irene M. Ray</a></footer>
        </div>
        <script src="assets//js/main.js" type="module"></script>
    </body>
</html>
